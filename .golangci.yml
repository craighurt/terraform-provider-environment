# Visit https://golangci-lint.run/ for usage documentation
# and information on other useful linters
issues:
  max-same-issues: 0

linters-settings:
  go: "1.22"

linters:
  # Run only enabled linters
  disable-all: true
  enable:
    - copyloopvar
    - durationcheck
    - errcheck
    - gofmt
    - gosimple
    - govet
    - ineffassign
    - makezero
    - misspell
    - nilerr
    - paralleltest
    - predeclared
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
